<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ProjX – Projectile Simulator</title>
  <meta name="description" content="Interactive projectile physics simulator and game built with ProjX DSL">
  <link rel="stylesheet" href="styles.css">
</head>

<body class="mode-simulate">

  <!-- ── Header ── -->
  <header class="header">
    <div class="logo">Proj<span>X</span></div>
    <div class="tabs" id="dynamic-tabs">
      <!-- populated by app.js from projxData array -->
    </div>
  </header>

  <!-- ── Main ── -->
  <div class="main">

    <!-- ── Canvas + Readout ── -->
    <div class="canvas-area" style="flex:1;">
      <div class="canvas-wrap">
        <canvas id="projx-canvas"></canvas>
      </div>
      <div class="readout-bar" id="readout-bar">
        <!-- populated by app.js -->
      </div>
    </div>

  </div>

  <script src="data.js"></script>
  <script src="canvas.js"></script>
  <script src="app.js"></script>

</body>

</html>
